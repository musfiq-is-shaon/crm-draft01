name: CRM
description: "CRM Mobile - A comprehensive CRM application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  
  # Network
  dio: ^5.8.0+1
  
  # Secure Storage
  flutter_secure_storage: ^9.2.4
  
  # Navigation
  go_router: ^14.8.1
  
  # Data Models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  
  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.3.1
  shimmer: ^3.0.0
  flutter_slidable: ^3.1.2
  
  # UI
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17
  
  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # Code Generation
  build_runner: ^2.4.15
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.5
  
  # App Icon Generator
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/crm_icon.png
  
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/crm_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/crm_icon.png"

